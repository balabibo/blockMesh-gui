# Simple Box Template
# Basic 3D box with uniform mesh

name: Simple Box
description: Basic 3D box with uniform mesh density. Good starting point for custom configurations.

domain:
  x:
    min: 0.0
    max: 1.0
  y:
    min: 0.0
    max: 1.0
  z:
    min: 0.0
    max: 1.0

n_x: 20
n_y: 20
n_z: 20

grading_x: 1.0
grading_y: 1.0
grading_z: 1.0

scale: 1.0

boundaries:
  - name: xMin
    type: wall
    faces:
      - [0, 4, 7, 3]
  - name: xMax
    type: wall
    faces:
      - [2, 6, 5, 1]
  - name: yMin
    type: wall
    faces:
      - [1, 5, 4, 0]
  - name: yMax
    type: wall
    faces:
      - [3, 7, 6, 2]
  - name: zMin
    type: wall
    faces:
      - [0, 3, 2, 1]
  - name: zMax
    type: wall
    faces:
      - [4, 5, 6, 7]