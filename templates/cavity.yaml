# Cavity (Lid-Driven Cavity) Template
# Classic benchmark case for CFD validation

name: Cavity
description: Lid-driven cavity case for CFD benchmark. 2D case with moving top wall.

domain:
  x:
    min: 0.0
    max: 0.1
  y:
    min: 0.0
    max: 0.1
  z:
    min: 0.0
    max: 0.01

n_x: 20
n_y: 20
n_z: 1

grading_x: 1.0
grading_y: 1.0
grading_z: 1.0

scale: 1.0

boundaries:
  - name: movingWall
    type: wall
    faces:
      - [3, 7, 6, 2]  # yMax (lid)
  - name: fixedWalls
    type: wall
    faces:
      - [0, 4, 7, 3]  # xMin
      - [2, 6, 5, 1]  # xMax
      - [1, 5, 4, 0]  # yMin
      - [0, 3, 2, 1]  # zMin
      - [4, 5, 6, 7]  # zMax